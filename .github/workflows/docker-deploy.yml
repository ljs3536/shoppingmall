name: CI/CD to DockerHub

on:
  push:
    branches:
      - master  # 혹은 사용 중인 브랜치

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17' # 네가 사용하는 자바 버전에 맞게

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build JAR
        run: ./gradlew clean build

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ljs3536/shoppingmall-springboot:latest
            ljs3536/shoppingmall-springboot:${{ github.sha }}

      - name: Update Kubernetes YAML with New Tag
        run: |
          # 1. k8s 폴더 내의 배포 파일에서 이미지 태그 업데이트
          # 기존에 ljs3536/shoppingmall-springboot:latest 또는 구버전 태그를 현재 커밋 해시로 변경
          sed -i "s|image: ljs3536/shoppingmall-springboot:.*|image: ljs3536/shoppingmall-springboot:${{ github.sha }}|g" k8s/springboot-deployment.yaml
          
          # 2. 변경사항 확인 (디버깅용)
          grep "image:" k8s/springboot-deployment.yaml

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Deploy: Update springboot image tag to ${{ github.sha }}"
          file_pattern: 'k8s/springboot-deployment.yaml'
