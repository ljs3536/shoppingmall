apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    app: springboot
    release: prom-stack
  name: springboot
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: springboot
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        app: springboot
    spec:
      containers:
        - env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
          image: ljs3536/shoppingmall-springboot:c8f5bb547d161804d7c8aa08aa9476c6f7bd0d9f
          name: springboot-container
          volumeMounts:
            - name: shared-storage
              mountPath: /upload
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: spring-app-config
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-pvc
      restartPolicy: Always
