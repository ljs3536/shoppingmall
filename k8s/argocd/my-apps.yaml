apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shoppingmall-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ljs3536/shoppingmall.git # 본인 레포
    targetRevision: HEAD
    path: k8s # YAML들이 모여있는 곳
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true